# Render Blueprint — infraestrutura como código.
# Ao conectar o repo no Render (Blueprints), ele lê este arquivo e cria o serviço.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: financeflow-api
    runtime: docker
    plan: free                       # free: dorme após inatividade (cold start ~30s) — ok p/ uso pessoal
    region: ohio                     # US East — perto do Neon (Azure East US 2) p/ minimizar latência API<->DB
    dockerfilePath: ./src/FinanceFlow.Api/Dockerfile
    dockerContext: .                 # contexto = raiz do repo (o Dockerfile faz COPY a partir daqui)
    healthCheckPath: /health         # Render só roteia tráfego depois que /health responde 200
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # sync:false = NÃO commitar o valor; você preenche no dashboard do Render (são segredos).
      - key: ConnectionStrings__Postgres   # connection string do Neon (cole a URI postgresql:// como vem; o app converte)
        sync: false
      - key: ANTHROPIC_API_KEY             # chave da Anthropic (rotacionar a antiga!)
        sync: false
      # API_KEY: usada em RUNTIME pelo ApiKeyMiddleware (.NET) E em BUILD-TIME pelo
      # frontend — o Render passa env vars como build-arg, e o Dockerfile injeta em
      # VITE_API_KEY. O front (mesma origem) manda esse valor no header X-Api-Key.
      - key: API_KEY
        generateValue: true                # o Render gera um valor aleatório forte automaticamente
